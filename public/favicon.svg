<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Крестики-нолики</title>
  <desc id="desc">Иконка игры крестики-нолики: мягкое поле с крестиками, ноликами и звездой.</desc>
  <defs>
    <linearGradient id="cardGradient" x1="12" y1="14" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="0.48" stop-color="#FDF2F8"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>

    <linearGradient id="xGradient" x1="26" y1="24" x2="102" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>

    <linearGradient id="oGradient" x1="30" y1="24" x2="98" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <linearGradient id="starGradient" x1="91" y1="14" x2="115" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>

    <filter id="symbolShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Transparent background by design: no full-size background rectangle -->

  <rect x="13" y="13" width="102" height="102" rx="28" fill="url(#cardGradient)" filter="url(#softShadow)"/>
  <rect x="24" y="26" width="80" height="78" rx="18" fill="rgba(255,255,255,0.72)" stroke="rgba(15,23,42,0.08)" stroke-width="2"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="5.5" stroke-linecap="round" opacity="0.86">
    <path d="M50 32V98"/>
    <path d="M78 32V98"/>
    <path d="M31 54H97"/>
    <path d="M31 78H97"/>
  </g>

  <!-- X symbol helper: use thick rounded strokes -->
  <g filter="url(#symbolShadow)" stroke="url(#xGradient)" stroke-width="8" stroke-linecap="round">
    <path d="M34 37L45 48"/>
    <path d="M45 37L34 48"/>

    <path d="M60 60L70 70"/>
    <path d="M70 60L60 70"/>

    <path d="M84 83L95 94"/>
    <path d="M95 83L84 94"/>
  </g>

  <!-- O symbols -->
  <g filter="url(#symbolShadow)" fill="none" stroke="url(#oGradient)" stroke-width="8" stroke-linecap="round">
    <circle cx="65" cy="42" r="9"/>
    <circle cx="41" cy="66" r="9"/>
    <circle cx="88" cy="66" r="9"/>
    <circle cx="65" cy="90" r="9"/>
  </g>

  <!-- Decorative star -->
  <path d="M99.5 16.5L103.6 27.2L114.3 31.3L103.6 35.4L99.5 46.1L95.4 35.4L84.7 31.3L95.4 27.2L99.5 16.5Z" fill="url(#starGradient)" filter="url(#symbolShadow)"/>
  <circle cx="112" cy="45" r="4.2" fill="#F59E0B" opacity="0.95"/>
</svg>
